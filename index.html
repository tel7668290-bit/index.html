<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通費生成</title>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.49.1/build/docxtemplater.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 750px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { color: #333; border-bottom: 2px solid #2b579a; padding-bottom: 10px; margin-top: 0; }
        .hint { color: #666; font-size: 14px; margin-bottom: 25px; background: #f0f4f8; padding: 12px; border-radius: 4px; border-left: 4px solid #2b579a; }
        
        /* 動態欄位樣式 */
        .employee-row { display: flex; align-items: center; background: #fff; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; gap: 10px; }
        .row-num { font-weight: bold; color: #2b579a; width: 25px; text-align: center; }
        input[type="text"] { padding: 8px 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .inp-name { width: 120px; }
        .inp-dates { flex-grow: 1; }
        .row-calc { font-size: 13px; color: #555; background: #f9f9f9; padding: 6px 10px; border-radius: 4px; white-space: nowrap; }
        .row-calc strong { color: #e04f5f; }
        
        /* 按鈕樣式 */
        button { cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 14px; }
        .btn-add { background-color: #217346; color: white; padding: 10px 15px; border: none; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 5px; }
        .btn-add:hover { background-color: #164e30; }
        .btn-delete { background-color: #fff; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 6px 10px; font-size: 16px; border-radius: 4px; }
        .btn-delete:hover { background-color: #ff4d4d; color: white; }
        .btn-submit { background-color: #2b579a; color: white; padding: 14px 20px; border: none; width: 100%; font-size: 16px; margin-top: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-submit:hover { background-color: #1b365d; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚗 里程補貼 Word 自動生成器 (彈性名冊版)</h2>
    <div class="hint">
        💡 <b>操作說明：</b><br>
        1. 點擊「➕ 新增員工項目」可無限擴充人數。<br>
        2. 輸入日期時請用<b>「,」逗號</b>隔開（例如：6/3,6/5），右側會即時自動計算天數與金額！(中英文逗號皆可通)
    </div>
    
    <div id="employee-container"></div>

    <button type="button" class="btn-add" onclick="addEmployeeRow()">➕ 新增員工項目</button>
    <button type="button" class="btn-submit" onclick="generateWord()">一秒生成 Word 報表</button>
</div>

<script>
    let rowIdCounter = 0;

    // 自動新增一行輸入框
    function addEmployeeRow() {
        rowIdCounter++;
        const container = document.getElementById('employee-container');
        
        const row = document.createElement('div');
        row.className = 'employee-row';
        row.id = `row-${rowIdCounter}`;
        
        row.innerHTML = `
            <span class="row-num"></span>
            <input type="text" class="inp-name" placeholder="員工姓名">
            <input type="text" class="inp-dates" placeholder="出差日期 (例: 6/3,6/5)" oninput="updateRowCalc(${rowIdCounter})">
            <div class="row-calc">
                共 <strong id="days-${rowIdCounter}">0</strong> 天 / 
                <strong>$</strong><strong id="amount-${rowIdCounter}">0</strong> 元
            </div>
            <button type="button" class="btn-delete" onclick="removeRow(${rowIdCounter})">×</button>
        `;
        
        container.appendChild(row);
        reindexRows();
    }

    // 刪除某一行
    function removeRow(id) {
        const row = document.getElementById(`row-${id}`);
        if (row) {
            row.remove();
            reindexRows();
        }
    }

    // 重新排列編號
    function reindexRows() {
        const rows = document.querySelectorAll('.employee-row');
        rows.forEach((row, index) => {
            row.querySelector('.row-num').innerText = `${index + 1}.`;
        });
    }

    // 自動計算天數與金額的邏輯 (已改為識別中英文逗號)
    function calcData(dateStr) {
        if (!dateStr || !dateStr.trim()) return { days: 0, amount: 0 };
        
        // 關鍵修改：將中文全形「，」一律替換成英文半形「,」
        const normalized = dateStr.replace(/，/g, ',');
        
        // 用逗號切開計算有幾天
        const days = normalized.split(',').filter(d => d.trim() !== "").length;
        const amount = Number((days * 26.4).toFixed(1)); 
        return { days, amount };
    }

    // 即時更新畫面數字
    function updateRowCalc(id) {
        const row = document.getElementById(`row-${id}`);
        const dateStr = row.querySelector('.inp-dates').value;
        
        const result = calcData(dateStr);
        
        document.getElementById(`days-${id}`).innerText = result.days;
        document.getElementById(`amount-${id}`).innerText = result.amount;
    }

    // 讀取網頁資料並生成 Word
    function generateWord() {
        const rows = document.querySelectorAll('.employee-row');
        const items = [];
        
        rows.forEach((row, index) => {
            const name = row.querySelector('.inp-name').value.trim();
            const dates = row.querySelector('.inp-dates').value.trim();
            const id = row.id.replace('row-', '');
            
            if (name || dates) {
                const result = calcData(dates);
                
                items.push({
                    no: index + 1,
                    name: name,
                    dates: dates, // 這裡會保留您原本輸入的逗號樣式直接印在 Word 上
                    days: result.days,
                    amount: result.amount
                });
            }
        });
        
        if (items.length === 0) {
            alert("❌ 請至少新增一筆員工資料再匯出！");
            return;
        }

        fetch('template.docx')
            .then(response => {
                if (!response.ok) throw new Error('找不到 template.docx 範本檔案！');
                return response.arrayBuffer();
            })
            .then(buffer => {
                const zip = new PizZip(buffer);
                const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

                doc.render({ items: items });

                const out = doc.getZip().generate({
                    type: "blob",
                    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                });
                saveAs(out, "里程補貼明細表_自動生成.docx");
            })
            .catch(error => {
                if (error.properties && error.properties.errors) {
                    alert("❌ Word 範本格式錯誤，請檢查是否有依照說明設定 { #items } 與 { /items } ！");
                } else {
                    alert("系統錯誤: " + error.message);
                }
            });
    }

    window.onload = function() {
        addEmployeeRow();
    };
</script>

</body>
</html>
